<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Basic Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="pt-12 px-4 md:px-8 pb-2 shrink-0">
        <div class="flex items-center justify-between mb-4">
            <button onclick="toggleMenu()" class="p-2 active:scale-90">
                <div class="w-8 h-2 bg-[#ffff00] border border-black rounded-full mb-1.5"></div>
                <div class="w-8 h-2 bg-[#ffff00] border border-black rounded-full mb-1.5"></div>
                <div class="w-8 h-2 bg-[#ffff00] border border-black rounded-full"></div>
            </button>
            <h1 id="ui-logo" class="text-3xl font-black italic brand-text uppercase">Basic Notes</h1>
        </div>
        
        <div class="mb-4">
            <input type="text" id="searchInput" oninput="render()" class="w-full bg-transparent border-b-4 border-current/20 p-2 outline-none text-xl font-bold font-['Raleway'] focus:border-[var(--brand-yellow)] transition-colors">
        </div>

        <div class="flex gap-2 justify-end mb-4 flex-wrap">
            <button onclick="sortNotes()" id="ui-btn-sort" class="header-btn">Time</button>
            <button onclick="exportAllNotes()" id="ui-btn-export" class="header-btn">Export All</button>
            <button onclick="document.getElementById('importBackup').click()" id="ui-btn-import" class="header-btn">Import</button>
            <input type="file" id="importBackup" class="hidden" accept=".json">
        </div>
        <div id="playlistTabs" class="flex gap-6 overflow-x-auto pb-2 border-b-2 border-current/20 no-scrollbar"></div>
    </header>

    <main id="notesList" class="px-4 md:px-8 py-4 overflow-y-auto no-scrollbar grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 items-start content-start flex-1"></main>

    <div id="attachmentsPreview" class="hidden px-8 pb-2 flex gap-2 overflow-x-auto no-scrollbar"></div>

    <footer class="px-4 md:px-8 pb-8 pt-2 shrink-0 bg-[var(--bg)]">
        <div class="flex justify-between text-[11px] mb-2 uppercase font-black raleway">
            <span id="ui-limit-label">Notes</span>
            <span id="ui-counter">0</span>
        </div>
        <div class="relative">
            <textarea id="ui-textarea" class="mint-textarea rounded-3xl p-5 h-24 text-xl font-bold"></textarea>
            <div class="absolute bottom-3 right-3 flex gap-2">
                <input type="file" id="attachFiles" class="hidden" multiple>
                <button onclick="document.getElementById('attachFiles').click()" class="bg-white/10 border-2 border-[var(--card-border)] w-14 h-14 rounded-2xl active:scale-90 flex items-center justify-center">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                </button>
                <button onclick="addNote()" class="bg-[#ffff00] border-2 border-black w-14 h-14 rounded-2xl active:scale-90 flex items-center justify-center shadow-lg">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="4"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </footer>

    <div id="menu" class="fixed top-0 h-full w-80 mint-menu z-50 p-10 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-12">
            <h3 id="ui-menu-title" class="text-3xl uppercase font-black raleway">МЕНЮ</h3>
            <button onclick="toggleMenu()" class="text-4xl text-black font-black">✕</button>
        </div>
        <nav class="flex-1 space-y-8 font-black text-2xl uppercase overflow-y-auto no-scrollbar raleway text-black">
            <div>
                <p id="ui-playlist-label" class="text-xs mb-4 opacity-70">Playlists</p>
                <div id="menuPlaylists" class="space-y-4"></div>
                <button onclick="showDialog('playlist')" id="ui-add-playlist" class="mt-6 text-sm border-4 border-black px-6 py-2 rounded-xl active:bg-black active:text-white">+ NEW</button>
            </div>
            <button onclick="toggleSettings()" id="ui-btn-settings-menu" class="w-full text-left py-3 border-b-4 border-black/20">Settings</button>
        </nav>
        <div class="mt-auto pt-6 flex justify-between items-center text-sm font-black raleway text-black">
            <div>v 2.3.0</div>
            <button onclick="toggleContact()" id="ui-btn-team" class="bg-black text-white px-6 py-3 rounded-full uppercase">TEAM</button>
        </div>
    </div>

    <div id="settingsScreen" class="full-screen-modal">
        <h2 id="ui-settings-title" class="brand-text font-black text-4xl italic mb-12 uppercase">Settings</h2>
        <div class="space-y-10 border-l-8 border-current pl-10 raleway text-[var(--text)]">
            <div class="flex gap-4">
                <button onclick="setLanguage('ru')" class="px-8 py-3 border-4 border-current rounded-xl font-black">RU</button>
                <button onclick="setLanguage('en')" class="px-8 py-3 border-4 border-current rounded-xl font-black">EN</button>
            </div>
            <div class="flex flex-col gap-4">
                <button onclick="setTheme('dark')" id="ui-theme-dark" class="text-left px-6 py-4 border-4 border-current rounded-xl uppercase font-black">Dark</button>
                <button onclick="setTheme('light')" id="ui-theme-light" class="text-left px-6 py-4 border-4 border-current rounded-xl uppercase font-black">Light</button>
                <button onclick="setTheme('accessible')" id="ui-theme-acc" class="text-left px-6 py-4 border-4 border-current rounded-xl uppercase font-black">HIGH CONTRAST</button>
            </div>
        </div>
        <button onclick="toggleSettings()" id="ui-settings-done" class="mt-auto border-4 border-current text-[var(--text)] py-6 rounded-3xl font-black uppercase raleway text-2xl">Done</button>
    </div>

    <div id="contactScreen" class="full-screen-modal">
        <h2 id="ui-team-title" class="brand-text font-black text-4xl italic mb-12 uppercase">Team</h2>
        <div class="space-y-8 border-l-8 border-current pl-10 mb-10 text-[var(--text)]">
            <p id="member-1" class="font-black text-3xl raleway"></p>
            <p id="member-2" class="font-black text-3xl raleway"></p>
        </div>
        <button onclick="toggleContact()" id="ui-team-close" class="mt-auto border-4 border-current text-[var(--text)] py-6 rounded-3xl font-black uppercase raleway text-2xl">Close</button>
    </div>

    <div id="customDialog" class="full-screen-modal justify-center items-center bg-black/90">
        <div class="w-full max-w-sm p-8 border-8 border-current rounded-3xl bg-[var(--bg)] text-[var(--text)]">
            <h2 id="dialogTitle" class="text-3xl font-black mb-6 uppercase text-center"></h2>
            <input type="text" id="dialogInput" class="w-full bg-transparent border-b-8 border-current mb-8 p-2 outline-none text-2xl font-black hidden">
            <p id="dialogDesc" class="mb-8 font-black text-xl text-center"></p>
            <div class="flex flex-col gap-4 raleway">
                <button id="dialogConfirmBtn" class="w-full bg-[#ffff00] text-black py-5 rounded-2xl font-black uppercase text-xl">OK</button>
                <button onclick="closeDialog()" id="ui-dialog-cancel" class="w-full border-4 border-current py-3 rounded-2xl font-black uppercase"></button>
            </div>
        </div>
    </div>

    <div id="viewNoteModal" class="full-screen-modal">
        <div class="flex-1 overflow-y-auto no-scrollbar pt-10" id="fullNoteContent">
            </div>
        <button onclick="closeNoteView()" id="ui-btn-close-view" class="mt-8 border-4 border-current text-[var(--text)] py-6 rounded-3xl font-black uppercase raleway text-2xl shrink-0">Back</button>
    </div>

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/80 hidden z-40 backdrop-blur-md"></div>

    <script src="script.js"></script>
</body>
</html>
